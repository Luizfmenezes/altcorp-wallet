workflows:
  ios-build:
    name: AltCorp Wallet iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2 # Usando as máquinas mais novas de 2026
    working_directory: frontend
    environment:
      node: latest
      xcode: latest
      vars:
        # Aqui você adicionará as chaves da Apple depois no painel
        XCODE_SCHEME: "App"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build Web Assets (Vite)
        script: npm run build
      - name: Capacitor Sync
        script: npx cap sync ios
      - name: Build iOS App
        script: | 
          # Este comando compila o projeto nativo gerado pelo Capacitor
          xcode-project build-ipa --workspace "$XCODE_WORKSPACE" --scheme "$XCODE_SCHEME"
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - seu-email@exemplo.com # Troque pelo seu e-mail