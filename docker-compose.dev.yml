# Development override for local testing
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  backend:
    ports:
      - "8000:8000"  # Expose backend for local development
    environment:
      DEBUG: "True"
      ALLOWED_ORIGINS: "http://localhost:8080,http://localhost:3000,http://localhost:5173"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "http://localhost:8000/api/v1"  # Build-time arg for API URL
