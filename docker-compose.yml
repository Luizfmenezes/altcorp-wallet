##########################################################
# AltCorp Wallet - Docker Compose
# ========================================================
# DEV:  docker compose --profile dev up --build
# VM:   docker compose --profile vm up --build -d
# PROD: docker compose --profile prod up --build -d
#
# Acesso DEV:  http://192.168.15.5:8080
# Acesso PROD: https://wallet.altcorphub.com
##########################################################

services:
  # ────────────────────────────────────────────────
  # PostgreSQL Database (compartilhado dev & prod)
  # ────────────────────────────────────────────────
  database:
    image: postgres:16-alpine
    container_name: altcorp-wallet-db
    restart: unless-stopped
    env_file:
      - .env
      - path: .env.local
        required: false
    environment:
      TZ: America/Sao_Paulo
      POSTGRES_USER: ${POSTGRES_USER:-walletuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-altcorp_wallet}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - wallet-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-walletuser} -d ${POSTGRES_DB:-altcorp_wallet}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ────────────────────────────────────────────────
  # Backend API - DEVELOPMENT (hot-reload)
  # ────────────────────────────────────────────────
  backend-dev:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: altcorp-wallet-backend-dev
    profiles: ["dev"]
    restart: unless-stopped
    env_file:
      - .env
      - path: .env.local
        required: false
    environment:
      TZ: America/Sao_Paulo
      DATABASE_URL: postgresql://${POSTGRES_USER:-walletuser}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB:-altcorp_wallet}
      API_HOST: "0.0.0.0"
      API_PORT: "8000"
      DEBUG: "true"
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8080,http://localhost:3000,http://192.168.15.5:8080,https://wallet.altcorphub.com}
      DOMAIN: ${DOMAIN:-192.168.15.5}
    ports:
      - "8000:8000"
    networks:
      - wallet-network
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/__pycache__
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload --proxy-headers --forwarded-allow-ips '*'

  # ────────────────────────────────────────────────
  # Backend API - VM/LAN (sem reload, HTTP por IP)
  # ────────────────────────────────────────────────
  backend-vm:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: altcorp-wallet-backend-vm
    profiles: ["vm"]
    restart: unless-stopped
    env_file:
      - .env
      - path: .env.local
        required: false
    environment:
      TZ: America/Sao_Paulo
      DATABASE_URL: postgresql://${POSTGRES_USER:-walletuser}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB:-altcorp_wallet}
      API_HOST: "0.0.0.0"
      API_PORT: "8000"
      DEBUG: ${DEBUG:-false}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8080,http://192.168.15.5:8080}
      DOMAIN: ${DOMAIN_VM:-192.168.15.5}
      FRONTEND_URL: ${FRONTEND_URL_VM:-http://192.168.15.5:8080}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI_VM:-http://192.168.15.5:8000/api/v1/auth/google-callback}
    ports:
      - "8000:8000"
    networks:
      - wallet-network
    depends_on:
      database:
        condition: service_healthy

  # ────────────────────────────────────────────────
  # Backend API - PRODUCTION (sem reload, otimizado)
  # ────────────────────────────────────────────────
  backend-prod:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: altcorp-wallet-backend
    profiles: ["prod"]
    restart: unless-stopped
    env_file:
      - .env
      - path: .env.local
        required: false
    environment:
      TZ: America/Sao_Paulo
      DATABASE_URL: postgresql://${POSTGRES_USER:-walletuser}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB:-altcorp_wallet}
      API_HOST: "0.0.0.0"
      API_PORT: "8000"
      DEBUG: ${DEBUG:-false}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://192.168.15.5:8080,https://wallet.altcorphub.com}
      DOMAIN: ${DOMAIN:-wallet.altcorphub.com}
      FRONTEND_URL: ${FRONTEND_URL:-https://wallet.altcorphub.com}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-https://wallet.altcorphub.com/api/v1/auth/google-callback}
    ports:
      - "8000:8000"
    networks:
      - wallet-network
    depends_on:
      database:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # ────────────────────────────────────────────────
  # Frontend - DEVELOPMENT (nginx HTTP em :8080)
  # ────────────────────────────────────────────────
  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
        NGINX_CONF: nginx.conf
    container_name: altcorp-wallet-frontend-dev
    profiles: ["dev"]
    restart: unless-stopped
    env_file:
      - .env
      - path: .env.local
        required: false
    ports:
      - "8080:80"
    networks:
      - wallet-network
    depends_on:
      - backend-dev
    environment:
      TZ: America/Sao_Paulo

  # ────────────────────────────────────────────────
  # Frontend - VM/LAN (HTTP em :8080)
  # ────────────────────────────────────────────────
  frontend-vm:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
        NGINX_CONF: nginx.vm.conf
    container_name: altcorp-wallet-frontend-vm
    profiles: ["vm"]
    restart: unless-stopped
    env_file:
      - .env
      - path: .env.local
        required: false
    ports:
      - "8080:80"
    networks:
      - wallet-network
    depends_on:
      - backend-vm
    environment:
      TZ: America/Sao_Paulo

  # ────────────────────────────────────────────────
  # Frontend - PRODUCTION (nginx + SSL em :8080)
  # ────────────────────────────────────────────────
  frontend-prod:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
        NGINX_CONF: nginx.prod.conf
    container_name: altcorp-wallet-frontend
    profiles: ["prod"]
    restart: unless-stopped
    env_file:
      - .env
      - path: .env.local
        required: false
    ports:
      - "8080:80"
      - "443:443"
    networks:
      - wallet-network
    depends_on:
      - backend-prod
    volumes:
      - ssl_certs:/etc/nginx/ssl:ro
      - certbot_www:/var/www/certbot:ro
    environment:
      TZ: America/Sao_Paulo

  # ────────────────────────────────────────────────
  # Certbot - Renovação automática de SSL (somente prod)
  # ────────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: altcorp-wallet-certbot
    profiles: ["prod"]
    volumes:
      - ssl_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done;'"
    depends_on:
      - frontend-prod

networks:
  wallet-network:
    driver: bridge
    name: altcorp-wallet-network

volumes:
  postgres_data:
    name: altcorp-wallet-postgres-data
  ssl_certs:
    name: altcorp-wallet-ssl-certs
  certbot_www:
    name: altcorp-wallet-certbot-www
