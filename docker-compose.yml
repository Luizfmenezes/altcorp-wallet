##########################################################
# AltCorp Wallet - Docker Compose
# ========================================================
# docker compose up --build
##########################################################

services:
  database:
    image: postgres:16-alpine
    container_name: altcorp-wallet-db
    restart: unless-stopped
    env_file:
      - .env
      - path: .env.local
        required: false
    environment:
      TZ: America/Sao_Paulo
      POSTGRES_USER: ${POSTGRES_USER:-walletuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-altcorp_wallet}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - wallet-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-walletuser} -d ${POSTGRES_DB:-altcorp_wallet}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: altcorp-wallet-backend
    restart: unless-stopped
    env_file:
      - .env
      - path: .env.local
        required: false
    environment:
      TZ: America/Sao_Paulo
      DATABASE_URL: postgresql://${POSTGRES_USER:-walletuser}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB:-altcorp_wallet}
      API_HOST: "0.0.0.0"
      API_PORT: "8000"
      DEBUG: "false"
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://192.168.15.5:8080}
      DOMAIN: ${DOMAIN:-192.168.15.5}
      FRONTEND_URL: ${FRONTEND_URL:-http://192.168.15.5:8080}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://192.168.15.5:8000/api/v1/auth/google-callback}
    ports:
      - "8000:8000"
    networks:
      - wallet-network
    depends_on:
      database:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    container_name: altcorp-wallet-frontend
    restart: unless-stopped
    env_file:
      - .env
      - path: .env.local
        required: false
    ports:
      - "8080:80"
    networks:
      - wallet-network
    depends_on:
      - backend
    environment:
      TZ: America/Sao_Paulo

networks:
  wallet-network:
    driver: bridge
    name: altcorp-wallet-network

volumes:
  postgres_data:
    name: altcorp-wallet-postgres-data
