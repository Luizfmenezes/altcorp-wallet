services:
  # PostgreSQL Database
  database:
    image: postgres:16-alpine
    container_name: altcorp-wallet-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-walletuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-walletpass123}
      POSTGRES_DB: ${POSTGRES_DB:-altcorp_wallet}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - wallet-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U walletuser -d altcorp_wallet"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: altcorp-wallet-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}
      API_HOST: 0.0.0.0
      API_PORT: 8000
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
    networks:
      - wallet-network
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload --proxy-headers --forwarded-allow-ips '*'

  # Frontend (React + Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # No need to pass VITE_API_URL, it will use .env.production value (/api/v1)
      # args:
      #   VITE_API_URL: ""
    container_name: altcorp-wallet-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    networks:
      - wallet-network
    depends_on:
      - backend

networks:
  wallet-network:
    driver: bridge
    name: altcorp-wallet-network

volumes:
  postgres_data:
    name: altcorp-wallet-postgres-data
